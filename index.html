<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>turismo</title>
    <link rel="stylesheet" href="">
    <link rel="icon" href="./img/avion.jpg" type="image/jpg">
</head>

<style>
    body {
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        
        color: white;
        margin: 0;
        padding: 0;
    }



    /* Estilo para los enlaces */
    a {
        background-color: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border: 2px solid white;
        border-radius: 5px;
        text-decoration: none;
        margin: 10px;
        display: inline-block;
        transition: background-color 0.3s ease, transform 0.3s ease;
    }

   

    /* Main content section */
    .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 20px;
        min-height: calc(100vh - 200px); /* Ajusta el contenido para que no se sobreponga al footer */
    }

    .main-content img {
        width: 80%;
        height: auto;
    }

    .header-logo-image {
        animation: pulse 1.5s infinite;
        display: block;
        margin: auto;
    }

    @keyframes pulse {
        0% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.1);
        }

        100% {
            transform: scale(1);
        }
    }

    .container {
        width: 100%;
        text-align: center;
    }

    /* Estilo para el enlace */
    .mi-enlace {
    color: #0066cc; /* Color del enlace */
    text-decoration: underline; /* Subrayado */
    font-size: 16px; /* Tamaño del texto */
    border: none; /* Quita cualquier borde */
    background: none; /* Quita el fondo */
    letter-spacing: normal; /* Elimina la separación entre letras */
    margin: 0; /* Elimina márgenes */
    padding: 0; /* Elimina el padding */
}

.mi-enlace:hover {
    color: #003366; /* Color cuando el mouse pasa por encima */
}


</style>

<body>
    <img src="./img/avion.jpg" alt="server logo" animation-logo="pulse" class="header-logo-image" width="320x" height="250x"> <!-- Logo con animación de pulsación -->


</body>

</html>
